pipelines:
  branches:
    main:
      - step:
          name: Deploy on Same Server
          runs-on:
            - self.hosted
            - linux.shell
          script:
            - echo "🚀 Starting local deployment on runner server..."

            - sudo chown -R ubuntu:ubuntu /home/ubuntu/gms-be

            - cd /home/ubuntu/gms-be
            - cp .env ../

            - sudo pm2 stop gms-be || true

            - sudo -u ubuntu git -C /home/ubuntu/gms-be clean -fdx
            - sudo -u ubuntu git -C /home/ubuntu/gms-be fetch --all
            - sudo -u ubuntu git -C /home/ubuntu/gms-be reset --hard origin/main

            - sudo npm cache clean --force
            - sudo cp /home/ubuntu/.env /home/ubuntu/gms-be

            - sudo -u ubuntu npm install --prefix /home/ubuntu/gms-be
            - sudo -u ubuntu npm run build --prefix /home/ubuntu/gms-be

            - sudo pm2 delete gms-be || true
            - sudo pm2 start /home/ubuntu/gms-be/dist/src/main.js --name gms-be

            - echo "✅ Deployment completed!"
