pipelines:
  branches:
    main:
      - step:
          name: Deploy on API Server
          runs-on:
            - self.hosted
            - linux.shell
          working_directory: /home/ubuntu/gms-be
          script:
            - echo "🚀 Starting deployment..."

            - echo "🔑 Setting permissions..."
            - sudo chown -R ubuntu:ubuntu /home/ubuntu/gms-be
            - cd /home/ubuntu/gms-be
            
            - echo "🛑 Stopping old PM2 process..."
            - sudo pm2 stop gms-be || true
            - sudo pm2 delete gms-be || true
            - sleep 5

            - echo "🔄 Updating code..."
            - git clean -fdx
            - git fetch --all
            - git reset --hard origin/main

            - echo "🧹 Cleaning dependencies & Prisma..."
            - npm cache clean --force
            - if [ -f /home/ubuntu/.env ]; then cp /home/ubuntu/.env /home/ubuntu/gms-be/.env; fi

            - echo "📦 Installing dependencies..."
            - npm install
  
            - echo "🏗️ Building project..."
            - npm run build
            - npx prisma generate
            - npx prisma migrate deploy || echo "Migrations already applied"
            - sleep 10

            - echo "🚀 Starting PM2..."
            - sudo pm2 start dist/main.js --name gms-be --no-autorestart
            - sudo pm2 save
            - sudo pm2 startup -u ubuntu --hp /home/ubuntu
            - sleep 5

            - echo "✅ Deployment completed!"
            - sudo pm2 status
