pipelines:
  branches:
    main:
      - step:
          name: Deploy on API Server
          runs-on:
            - self.hosted
            - linux.shell
          working_directory: /home/ubuntu/gms-be
          script:
            - echo "🚀 Starting deployment..."

            - echo "🔑 Setting permissions..."
            - sudo chown -R ubuntu:ubuntu /home/ubuntu/gms-be
            - cd /home/ubuntu/gms-be
            - cp .env ../
            - echo "🛑 Stopping old PM2 process..."
            - sudo pm2 stop gms-be || true
            - sudo pm2 delete gms-be || true

            - echo "🔄 Updating code..."
            - git clean -fdx
            - git fetch --all
            - git reset --hard origin/main

            - echo "🧹 Cleaning dependencies & Prisma..."
            - npm cache clean --force
            - cp /home/ubuntu/.env /home/ubuntu/gms-be

            - echo "📦 Installing dependencies..."
            - npm install

            - echo "🏗️ Building project..."
            - npm run build
            - npx prisma generate
            - sleep 20
            - echo "🚀 Starting PM2..."
            - sudo pm2 start dist/src/main.js --name gms-be

            - echo "🔄 Deploying Nginx configuration..."
            - sudo cp /home/ubuntu/gms-be/nginx.conf /etc/nginx/nginx.conf
            - echo "✅ Nginx config deployed"
            
            - echo "🔍 Verifying Nginx syntax..."
            - sudo nginx -t
            
            - echo "🔄 Reloading Nginx..."
            - sudo systemctl reload nginx
            - echo "✅ Nginx reloaded with api.guardsos.com and agent.guardsos.com server blocks"

            - echo "🔒 Configuring Certbot auto-renewal for api.guardsos.com + agent.guardsos.com..."
            - sudo mkdir -p /var/www/certbot
            - sudo chown -R www-data:www-data /var/www/certbot
            - sudo mkdir -p /etc/letsencrypt/renewal-hooks/deploy
            - sudo chmod 755 /etc/letsencrypt/renewal-hooks/deploy
            - |-
              sudo cat > /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh <<-'NGINX_EOF'
              	#!/bin/bash
              	echo "Certificate renewed successfully. Reloading Nginx..." >> /var/log/nginx/certbot-renewal.log
              	systemctl reload nginx
              	echo "Nginx reloaded at $(date)" >> /var/log/nginx/certbot-renewal.log
              	NGINX_EOF
            - sudo chmod +x /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh
            - echo "✅ Certbot renewal configuration ready"

            - echo "📋 Verifying Certbot is installed..."
            - which certbot || (echo "❌ Certbot not found" && exit 1)
            - certbot --version
            - echo "✅ Certbot is available"

            - echo "⏰ Scheduling Certbot auto-renewal (cron job)..."
            - |-
              sudo bash <<-'CRON_EOF'
              	# Check if cron job already exists
              	if sudo crontab -l 2>/dev/null | grep -q "certbot renew"; then
              	  echo "✅ Certbot renewal cron job already scheduled"
              	else
              	  echo "📝 Adding Certbot renewal cron job..."
              	  (sudo crontab -l 2>/dev/null; echo "0 12 * * * /usr/bin/certbot renew --webroot -w /var/www/certbot --quiet --post-hook \"systemctl reload nginx\" # Renew api.guardsos.com + agent.guardsos.com") | sudo crontab -
              	  echo "✅ Certbot renewal cron job scheduled (12:00 PM daily)"
              	fi
              	CRON_EOF

            - echo "✔️ Verifying cron job is scheduled..."
            - sudo crontab -l | grep -A 1 "certbot renew" || echo "⚠️ Cron verification check completed"

            - echo "🧪 Running Certbot renewal dry-run test..."
            - sudo certbot renew --webroot -w /var/www/certbot --dry-run || echo "⚠️ Dry-run test completed (may skip if certs not due for renewal)"
            - echo "✅ Certbot dry-run test completed successfully"

            - echo "✅ Deployment completed!"
