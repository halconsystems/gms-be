pipelines:
  branches:
    main:
      - step:
          name: Deploy on Same Server
          runs-on:
            - self.hosted
            - linux.shell
          working_directory: /home/ubuntu/gms-be
          script:
            - echo "🚀 Starting deployment..."

            - echo "🔑 Setting permissions..."
            - sudo chown -R ubuntu:ubuntu /home/ubuntu/gms-be
            - cp .env ../
            - echo "🛑 Stopping old PM2 process..."
            - pm2 stop gms-be || true
            - ubuntu pm2 delete gms-be || true

            - echo "🔄 Updating code..."
            - git clean -fdx
            - ubuntu git fetch --all
            - git reset --hard origin/main

            - echo "🧹 Cleaning dependencies & Prisma..."
            - npm cache clean --force
            - cp /home/ubuntu/.env /home/ubuntu/gms-be

            - echo "📦 Installing dependencies..."
            - ubuntu npm install

            - echo "🏗️ Building project..."
            - ubuntu npm run build

            - echo "🚀 Starting PM2..."
            - pm2 start /home/ubuntu/gms-be/dist/src/main.js --name gms-be

            - echo "✅ Deployment completed!"
