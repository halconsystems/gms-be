pipelines:
  branches:
    main:
      - step:
          name: Deploy on Same Server
          runs-on:
            - self.hosted
            - linux.shell
          script:
            - echo "🚀 Starting deployment..."

            # Ensure correct permissions
            - sudo chown -R ubuntu:ubuntu /home/ubuntu/gms-be
            - cd /home/ubuntu/gms-be

            # Stop existing PM2 app
            - pm2 stop gms-be || true
            - pm2 delete gms-be || true

            # Update code as ubuntu
            - sudo -u ubuntu git clean -fdx
            - sudo -u ubuntu git fetch --all
            - sudo -u ubuntu git reset --hard origin/main

            # Install deps, build, generate Prisma as ubuntu
            - sudo -u ubuntu npm install
            - sudo -u ubuntu npm run build
            - sudo -u ubuntu npx prisma generate

            # Start PM2 as ubuntu with correct cwd and env
            - sudo -u ubuntu pm2 start dist/src/main.js --name gms-be --cwd /home/ubuntu/gms-be --env production

            - echo "✅ Deployment completed!"
