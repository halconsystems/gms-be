image: atlassian/default-image:3

pipelines:
  branches:
    main:
      - step:
          name: Deploy to Prod Server
          script:
            - pipe: atlassian/ssh-run:0.2.8
              variables:
                SSH_USER: $sshuser
                SERVER: $prodip
                COMMAND: |
                  bash -lc "
                    echo '🔑 Setting permissions...'
                    sudo chown -R ubuntu:ubuntu /home/ubuntu/gms-be

                    echo '📂 Entering project...'
                    cd /home/ubuntu/gms-be

                    echo '🛑 Stopping old PM2 process...'
                    sudo pm2 stop gms-be || true

                    echo '🔄 Resetting to latest main...'
                    git fetch origin main
                    git reset --hard origin/main
                    git clean -fd
                    git pull origin main

                    echo '🧹 Cleaning old dependencies & Prisma...'
                    rm -rf node_modules package-lock.json
                    rm -rf dist
                    npm cache clean --force

                    echo '📦 Installing dependencies...'
                    npm install --legacy-peer-deps

                    echo '⚙️ Generating Prisma client...'
                    npx prisma generate

                    echo '🏗️ Building project...'
                    npm run build

                    echo '🚀 Restarting PM2...'
                    sudo pm2 delete gms-be || true
                    sudo pm2 start dist/src/main.js --name gms-be

                    echo '✅ Deployment completed!'
                  "
