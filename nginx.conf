user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # CRITICAL FIX: Disable gzip to prevent Content-Length mismatch
    gzip off;

    # Real IP Configuration - Set real client IP from EC2 ALB/proxy
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # API Backend - Running on port 5001
    upstream api_backend {
        server gms-be:5001;
        keepalive 32;
    }

    # HTTP Server for API
    server {
        listen 80;
        server_name api.guardsos.com localhost;

        # API Proxy
        location / {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            
            # Connection headers
            proxy_set_header Connection "";
            proxy_set_header Upgrade $http_upgrade;
            
            # Client IP headers - CRITICAL for offline agent
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Fix Content-Length mismatch
            proxy_set_header Transfer-Encoding chunked;
            proxy_ignore_client_abort on;
            
            proxy_cache_bypass $http_upgrade;
            
            # Buffering configuration
            proxy_buffering off;
            proxy_request_buffering off;
        }
    }
}

