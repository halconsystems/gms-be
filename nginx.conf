user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # CRITICAL FIX: Disable gzip to prevent Content-Length mismatch
    gzip off;

    # Real IP Configuration - Set real client IP from EC2 ALB/proxy
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # WebSocket/Upgrade Connection Map - Routes upgrade requests correctly through Nginx
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # API Backend - Running on port 5001
    upstream api_backend {
        server localhost:5001;
        keepalive 32;
    }

    # HTTP to HTTPS Redirect for all backend domains
    server {
        listen 80;
        server_name api.guardsos.com agent.guardsos.com localhost;

        # ACME Challenge location - Allow Let's Encrypt to verify domain ownership
        # Must not redirect or return 403 for certificate renewals to succeed
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        # Redirect all other HTTP traffic to HTTPS while preserving the requested hostname
        # This ensures agent.guardsos.com → https://agent.guardsos.com (not forced to api)
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # API Domain - Full backend access (HTTPS on port 443)
    server {
        listen 443 ssl http2;
        server_name api.guardsos.com;

        # SSL Certificate and Key (Let's Encrypt - multi-domain cert)
        ssl_certificate /etc/letsencrypt/live/api.guardsos.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.guardsos.com/privkey.pem;

        # SSL Configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Full API Access - All routes proxied to backend
        location / {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            
            # Connection headers for WebSocket/upgrade support
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Upgrade $http_upgrade;
            
            # Client IP and forwarding headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Timeouts for long-running requests (fingerprint capture)
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering configuration
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_cache_bypass $http_upgrade;
        }

        # Logging
        access_log /var/log/nginx/api-access.log main;
        error_log /var/log/nginx/api-error.log warn;
    }

    # Agent Domain - Restricted access (HTTPS on port 443)
    server {
        listen 443 ssl http2;
        server_name agent.guardsos.com;

        # SSL Certificate and Key (Let's Encrypt - same multi-domain cert)
        ssl_certificate /etc/letsencrypt/live/api.guardsos.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.guardsos.com/privkey.pem;

        # SSL Configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security Headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Agent-specific endpoints only
        location /api/agents/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            
            # Connection headers for WebSocket/upgrade support
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Upgrade $http_upgrade;
            
            # Client IP and forwarding headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # Timeouts for agent operations
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # Buffering configuration
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_cache_bypass $http_upgrade;
        }

        # Deny all other paths on agent domain (security: prevent access to other APIs)
        location / {
            return 403 "Access denied on agent domain. Only /api/agents/* is allowed.";
        }

        # Logging
        access_log /var/log/nginx/agent-access.log main;
        error_log /var/log/nginx/agent-error.log warn;
    }
}

